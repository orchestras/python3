name: Build and Release Python Binaries

# Triggered by a new v* tag.
# Builds native PyInstaller binaries per platform, then creates a GitHub Release.
# NOTE: Python cannot truly cross-compile — each platform must build natively.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - os: macos-latest
            suffix: darwin-arm64
            ext: ""
          - os: macos-13
            suffix: darwin-amd64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Install dependencies
        run: uv sync

      - name: Get metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(uv run python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          NAME=$(uv run python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['name'])
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --clean \
            --name "${{ steps.meta.outputs.name }}-${{ matrix.suffix }}" \
            --distpath bin \
            --workpath build/pyinstaller \
            --specpath build \
            src/python_template/__main__.py

      - name: Generate checksum
        shell: bash
        run: |
          cd bin
          BINARY="${{ steps.meta.outputs.name }}-${{ matrix.suffix }}${{ matrix.ext }}"
          if command -v shasum &>/dev/null; then
            shasum -a 256 "${BINARY}" > "${BINARY}.sha256"
          else
            sha256sum "${BINARY}" > "${BINARY}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            bin/${{ steps.meta.outputs.name }}-${{ matrix.suffix }}${{ matrix.ext }}
            bin/${{ steps.meta.outputs.name }}-${{ matrix.suffix }}${{ matrix.ext }}.sha256

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Get metadata
        id: meta
        run: |
          VERSION=$(uv run python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          NAME=$(uv run python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['name'])
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.package
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            TAG=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.name }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.meta.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Get project name
        id: meta
        run: |
          NAME=$(uv run python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['name'])
          " 2>/dev/null || echo "python-template")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Read changelog excerpt
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            body=$(awk '/^## \[/{if(p)exit; p=1} p' CHANGELOG.md | head -100)
            {
              echo "body<<EOF"
              echo "${body}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**/*
          generate_release_notes: true
