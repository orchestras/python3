name: Build and Release Python Binaries

# Triggered by a new v* tag (created by bump.yml or manually).
# Builds native binaries with PyInstaller on each platform in parallel,
# then creates a GitHub Release with all artifacts and checksums.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - os: ubuntu-latest-arm
            suffix: linux-arm64
            ext: ""
          - os: macos-latest
            suffix: darwin-arm64
            ext: ""
          - os: macos-13
            suffix: darwin-amd64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Get project name and version
        id: meta
        shell: bash
        run: |
          VERSION=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          NAME=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['name'])
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "binary=${NAME}-${{ matrix.suffix }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          python -m PyInstaller \
            --onefile \
            --clean \
            --name "${{ steps.meta.outputs.name }}-${{ matrix.suffix }}" \
            --distpath bin \
            --workpath build/pyinstaller \
            --specpath build \
            src/python_template/__main__.py

      - name: Generate checksum
        shell: bash
        run: |
          cd bin
          BINARY="${{ steps.meta.outputs.name }}-${{ matrix.suffix }}${{ matrix.ext }}"
          if command -v shasum &>/dev/null; then
            shasum -a 256 "${BINARY}" > "${BINARY}.sha256"
          else
            sha256sum "${BINARY}" > "${BINARY}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: |
            bin/${{ steps.meta.outputs.name }}-${{ matrix.suffix }}${{ matrix.ext }}
            bin/${{ steps.meta.outputs.name }}-${{ matrix.suffix }}${{ matrix.ext }}.sha256

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Read release notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract the top-most changelog section
            body=$(awk '/^## \[/{if(p)exit; p=1} p' CHANGELOG.md | head -100)
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "${body}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get project name
        id: meta
        run: |
          NAME=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['name'])
          ")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
          generate_release_notes: true
