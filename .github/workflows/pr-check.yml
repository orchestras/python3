name: PR Check

# This workflow produces GitHub Status Checks that are referenced by the
# branch ruleset applied with `mise run vcs:protect`.
# Each job name below MUST match the "context" strings in that ruleset:
#   - pr-check / lint
#   - pr-check / typecheck
#   - pr-check / test
#   - pr-check / security
#
# How required status checks work:
# 1. Create this file and push it to the default branch (develop).
# 2. Run the workflow at least once so GitHub learns the check names.
# 3. Go to Settings → Rules → Rulesets and add the check names OR
#    run `mise run vcs:protect` to apply via API.

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install dependencies
        run: mise run install

      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install dependencies
        run: mise run install

      - name: Install ty
        run: uv tool install ty || pip install ty

      - name: Type check with ty
        run: ty check src/

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=src/python_template \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install dependencies
        run: mise run install

      - name: Audit dependencies (pip-audit)
        run: |
          uv tool install pip-audit
          uv tool run pip-audit --format json --output pip-audit.json || true
          uv tool run pip-audit

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit.json
          if-no-files-found: ignore

      - name: Run Bandit security linter
        run: |
          uv tool install bandit
          uv tool run bandit -r src/ -f sarif -o bandit.sarif || true
          uv tool run bandit -r src/

      - name: Upload Bandit SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit
        continue-on-error: true
