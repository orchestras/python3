name: Tag & Release Version

# Runs on push to main. Reads the version from pyproject.toml (set locally
# by `mise run bump:patch/minor/major`), ensures version.py is synced,
# and creates + pushes the git tag. The tag push triggers release.yml.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install dependencies
        run: uv sync

      - name: Read version and sync version.py
        id: ver
        run: |
          VERSION=$(uv run python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_plain=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current version: v${VERSION}"

          # Regenerate version.py (idempotent)
          cat > src/python_template/version.py << PYEOF
          # This file is auto-generated by \`mise run build\`.
          # Do not edit manually.
          __version__ = "${VERSION}"
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet src/python_template/version.py; then
            git add src/python_template/version.py
            git commit -m "chore: sync version.py to ${VERSION} [skip ci]"
            git push origin main
            echo "Committed version.py sync"
          fi

      - name: Create and push tag
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          git fetch --tags origin

          if git tag -l | grep -qx "${TAG}"; then
            echo "Tag ${TAG} already exists — nothing to do."
            exit 0
          fi

          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          echo "✓ Tagged and pushed ${TAG} → release.yml will fire"
